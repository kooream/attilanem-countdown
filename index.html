<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Találkozó – Attilánéval</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f0e8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
.card{background:#faf7f2;border-radius:24px;padding:2rem 1.5rem;text-align:center;width:100%;max-width:480px;position:relative;overflow:hidden;}
canvas.cc{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.inner{position:relative;z-index:1;}
.hero{font-family:'Playfair Display',serif;font-size:clamp(20px,5vw,28px);font-weight:400;color:#5c3d2e;margin-bottom:2px;}
.sub{font-family:'Playfair Display',serif;font-size:clamp(12px,3vw,14px);font-style:italic;color:#9c7b66;margin-bottom:6px;}
.dateline{font-size:clamp(11px,2.5vw,13px);color:#9c7b66;letter-spacing:0.04em;margin-bottom:1.4rem;}
.div{width:50px;height:1px;background:#e8ddd0;margin:0 auto 1.2rem;}
.badge{display:inline-block;background:#c4956a;color:#fff9f3;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;padding:4px 14px;border-radius:20px;margin-bottom:10px;font-family:'Playfair Display',serif;}
.cd{display:flex;justify-content:center;gap:clamp(4px,2vw,10px);align-items:flex-end;margin-bottom:1.6rem;}
.unit{display:flex;flex-direction:column;align-items:center;gap:4px;}
.num{font-family:'Playfair Display',serif;font-size:clamp(36px,12vw,58px);font-weight:400;color:#5c3d2e;line-height:1;min-width:clamp(48px,14vw,78px);font-variant-numeric:tabular-nums;}
.lbl{font-size:clamp(9px,2vw,11px);color:#9c7b66;letter-spacing:0.1em;text-transform:uppercase;}
.sep{font-size:clamp(24px,8vw,38px);color:#e8ddd0;margin-bottom:clamp(12px,4vw,20px);line-height:1;}
.arrived{font-family:'Playfair Display',serif;font-size:clamp(18px,5vw,24px);color:#c4956a;margin:1rem 0;}
.time-section{background:#fff9f3;border:1px solid #e8ddd0;border-radius:14px;padding:1rem;margin-bottom:0.8rem;}
.time-title{font-size:11px;color:#9c7b66;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px;}
.dt-input{font-size:clamp(15px,4vw,18px);color:#5c3d2e;background:#faf7f2;border:1.5px solid #c4956a;border-radius:10px;padding:8px 12px;width:100%;text-align:center;font-family:'Playfair Display',serif;outline:none;}
.dt-input:focus{border-color:#8b6148;}
.sound-section{background:#fff9f3;border:1px solid #e8ddd0;border-radius:14px;padding:0.9rem 1rem;display:flex;align-items:center;gap:12px;}
.sound-btn{background:#c4956a;border:none;border-radius:50%;width:48px;height:48px;min-width:48px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.sound-btn:hover{background:#8b6148;}
.sound-note{font-size:clamp(12px,3vw,13px);color:#9c7b66;font-style:italic;text-align:left;line-height:1.4;}
</style>
</head>
<body>
<div class="card" id="card">
<canvas class="cc" id="cc"></canvas>
<div class="inner">
<p class="hero">Találkozó Attilánéval</p>
<p class="sub">Ha számolnád a perceket.</p>
<p class="dateline" id="dateline">–</p>
<div class="div"></div>
<div class="badge">Visszaszámláló</div>
<div id="cd-wrap">
<div class="cd">
<div class="unit"><span class="num" id="d">--</span><span class="lbl">nap</span></div>
<span class="sep">·</span>
<div class="unit"><span class="num" id="h">--</span><span class="lbl">óra</span></div>
<span class="sep">·</span>
<div class="unit"><span class="num" id="m">--</span><span class="lbl">perc</span></div>
<span class="sep">·</span>
<div class="unit"><span class="num" id="s">--</span><span class="lbl">mp</span></div>
</div>
</div>
<div id="arrived" style="display:none"><p class="arrived">Megérkezett a pillanat!</p></div>
<div class="div"></div>
<div class="time-section">
<p class="time-title">Időpont pontosítás</p>
<input class="dt-input" type="datetime-local" id="dti" oninput="onDTI(this.value)">
</div>
<div class="sound-section">
<button class="sound-btn" id="sbtn" aria-label="Zene be/ki">
<svg id="sicon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
</button>
<span class="sound-note" id="snote">Zenéhez katt ide</span>
</div>
</div>
</div>
<script>
let target = new Date();
target.setDate(target.getDate() + ((7 - target.getDay()) % 7 || 7));
target.setHours(18, 0, 0, 0);

const pad = n => String(n).padStart(2,'0');
const toLocal = d => d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes());

document.getElementById('dti').value = toLocal(target);

const updateDate = () => {
  const wd = target.toLocaleDateString('hu-HU',{weekday:'long'});
  const dt = target.toLocaleDateString('hu-HU',{year:'numeric',month:'long',day:'numeric'});
  document.getElementById('dateline').textContent = wd+', '+dt+' · '+pad(target.getHours())+':'+pad(target.getMinutes());
};

const onDTI = v => {
  const d = new Date(v);
  if(!isNaN(d)){target=d; updateDate();}
};

const tick = () => {
  const diff = target - new Date();
  const cdw = document.getElementById('cd-wrap');
  const arr = document.getElementById('arrived');
  if(diff <= 0){
    cdw.style.display='none'; arr.style.display='block';
    if(!confOn) startConf();
    return;
  }
  cdw.style.display='block'; arr.style.display='none';
  const ts = Math.floor(diff/1000);
  document.getElementById('d').textContent = pad(Math.floor(ts/86400));
  document.getElementById('h').textContent = pad(Math.floor((ts%86400)/3600));
  document.getElementById('m').textContent = pad(Math.floor((ts%3600)/60));
  document.getElementById('s').textContent = pad(ts%60);
};

let actx=null, playing=false, confOn=false, loopTimeout=null;

function guitarNote(ctx,freq,when,dur){
  const sr=ctx.sampleRate, N=Math.round(sr/freq);
  const buf=ctx.createBuffer(1,N,sr), data=buf.getChannelData(0);
  for(let i=0;i<N;i++) data[i]=Math.random()*2-1;
  const src=ctx.createBufferSource(); src.buffer=buf; src.loop=true;
  const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=freq*5;
  const g=ctx.createGain();
  g.gain.setValueAtTime(0,when);
  g.gain.linearRampToValueAtTime(0.45,when+0.015);
  g.gain.exponentialRampToValueAtTime(0.001,when+dur);
  const dl=ctx.createDelay(); dl.delayTime.value=1/freq;
  const fb=ctx.createGain(); fb.gain.value=0.96;
  src.connect(lp); lp.connect(dl); dl.connect(fb); fb.connect(dl); dl.connect(g); g.connect(ctx.destination);
  src.start(when); src.stop(when+dur+0.05);
}

const C=261.63,D=293.66,E=329.63,F=349.23,G=392.00,A=440.00;
const boci=[
  [G,0.35],[G,0.35],[E,0.35],[E,0.35],[D,0.7],
  [F,0.35],[F,0.35],[E,0.7],[D,0.7],
  [G,0.35],[G,0.35],[E,0.35],[E,0.35],[D,0.7],
  [F,0.35],[F,0.35],[C,1.0],
  [G,0.35],[A,0.35],[G,0.35],[F,0.35],[E,0.7],
  [F,0.35],[E,0.35],[D,0.7],[D,0.7],
  [G,0.35],[A,0.35],[G,0.35],[F,0.35],[E,0.7],
  [F,0.35],[F,0.35],[C,1.0]
];
const totalDur = boci.reduce((s,[,d])=>s+d,0);

function playBoci(ctx){
  if(!playing) return;
  let t=ctx.currentTime+0.05;
  for(const[freq,dur] of boci){guitarNote(ctx,freq,t,dur*1.1); t+=dur;}
  loopTimeout=setTimeout(()=>playBoci(ctx), totalDur*1000+300);
}

const muteIcon='<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>';
const volIcon='<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>';

function toggleSound(){
  if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended') actx.resume();
  playing=!playing;
  document.getElementById('sicon').innerHTML=playing?muteIcon:volIcon;
  document.getElementById('snote').textContent=playing?'Zene szól – katt a kikapcsoláshoz':'Zenéhez katt ide';
  if(playing){playBoci(actx);}else{clearTimeout(loopTimeout);}
}

document.getElementById('sbtn').addEventListener('touchstart',function(e){
  e.preventDefault(); toggleSound();
},{passive:false});
document.getElementById('sbtn').addEventListener('click',function(e){
  if(window.matchMedia('(hover:none)').matches) return;
  toggleSound();
});

const startConf=()=>{
  confOn=true;
  const cv=document.getElementById('cc'), card=document.getElementById('card');
  cv.width=card.offsetWidth; cv.height=card.offsetHeight;
  const ctx=cv.getContext('2d'), cols=['#c4956a','#e8c9a0','#d4a574','#8b6148','#f0e6d8','#b8860b'];
  const parts=Array.from({length:80},()=>({x:Math.random()*cv.width,y:-20,r:3+Math.random()*6,col:cols[Math.floor(Math.random()*cols.length)],vx:(Math.random()-0.5)*2.5,vy:1.8+Math.random()*2.5,rot:Math.random()*Math.PI*2,rs:(Math.random()-0.5)*0.12}));
  const draw=()=>{ctx.clearRect(0,0,cv.width,cv.height);parts.forEach(p=>{ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.col;ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*0.5);ctx.restore();p.x+=p.vx;p.y+=p.vy;p.rot+=p.rs;if(p.y>cv.height+20){p.y=-20;p.x=Math.random()*cv.width;}});if(confOn)requestAnimationFrame(draw);};
  draw();
};

updateDate(); tick(); setInterval(tick,1000);
</script>
</body>
</html>
